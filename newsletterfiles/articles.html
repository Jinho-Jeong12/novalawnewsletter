<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전체 뉴스레터 — 법무법인 노바</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#EEF2F7;
  --surface:#FFFFFF;
  --surface-2:#F6F9FC;
  --navy:#0A1628;
  --navy-l:#1B3870;
  --navy-pale:#ECF0F9;
  --red:#C83820;
  --red-d:#A82E1A;
  --ink:#0D1829;
  --txt:#1E2A3B;
  --txt2:#4B5A6B;
  --txt3:#8FA0B4;
  --border:#D6E0EC;
  --border-l:#EEF2F7;
  --sh:0 1px 3px rgba(15,35,71,.06),0 4px 14px rgba(15,35,71,.05);
  --sh2:0 4px 16px rgba(15,35,71,.12),0 2px 6px rgba(15,35,71,.06);
}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);min-height:100vh;}

/* ── HEADER ── */
.page-header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--sh);
}
.page-header-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0;
}
.header-brand{display:flex;align-items:center;gap:16px;text-decoration:none;}
.header-logo{
  font-family:'Inter',sans-serif;font-size:18px;font-weight:800;
  letter-spacing:-.03em;color:var(--navy);
}
.header-sep{width:1px;height:18px;background:var(--border);}
.header-page-title{
  font-family:'Inter',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);
}
.header-back{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--navy-l);
  text-decoration:none;border:1px solid var(--navy-l);padding:7px 16px;
  transition:background .2s,color .2s;
}
.header-back:hover{background:var(--navy-l);color:#fff;}

/* ── HERO BAR ── */
.hero-bar{
  background:var(--navy);padding:48px 40px;
}
.hero-bar-inner{max-width:1200px;margin:0 auto;}
.hero-bar-eyebrow{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4);
  margin-bottom:12px;
}
.hero-bar-title{
  font-family:'Noto Serif KR',serif;font-size:36px;font-weight:700;
  color:#fff;line-height:1.2;margin-bottom:8px;
}
.hero-bar-sub{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:300;
  color:rgba(255,255,255,.55);
}

/* ── FILTER BAR ── */
.filter-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  position:sticky;top:65px;z-index:90;
}
.filter-bar-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.filter-item{
  flex:none;padding:13px 18px;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);
  cursor:pointer;position:relative;white-space:nowrap;
  transition:color .2s;border-right:1px solid var(--border-l);
}
.filter-item::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--navy);transform:scaleX(0);transition:transform .22s;
}
.filter-item.active{color:var(--navy);}
.filter-item.active::after,.filter-item:hover::after{transform:scaleX(1);}
.filter-item:hover{color:var(--navy-l);}
.filter-count{
  display:inline-block;margin-left:5px;
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  background:var(--navy-pale);color:var(--navy-l);
  padding:1px 5px;border-radius:2px;
}

/* ── CONTENT ── */
.content{max-width:1200px;margin:0 auto;padding:36px 40px 60px;}

/* ── SEARCH ── */
.search-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;gap:16px;flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:0;
  border:1px solid var(--border);background:var(--surface);
  flex:1;max-width:400px;
}
.search-input{
  flex:1;padding:10px 14px;border:none;outline:none;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:300;
  color:var(--ink);background:transparent;
}
.search-input::placeholder{color:var(--txt3);}
.search-btn{
  padding:10px 16px;background:var(--navy);border:none;
  font-family:'Inter',sans-serif;font-size:11px;color:#fff;
  cursor:pointer;transition:background .2s;white-space:nowrap;
}
.search-btn:hover{background:var(--navy-l);}
.result-info{
  font-family:'Noto Sans KR',sans-serif;font-size:12px;
  font-weight:300;color:var(--txt3);
}

/* ── SORT ── */
.sort-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.sort-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);
}
.sort-btn{
  padding:5px 12px;background:none;border:1px solid var(--border);
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.08em;color:var(--txt2);cursor:pointer;transition:all .18s;
}
.sort-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.sort-btn:hover:not(.active){border-color:var(--navy-l);color:var(--navy-l);}

/* ── ARTICLE LIST ── */
.art-list{display:flex;flex-direction:column;gap:0;}
.art-row{
  display:grid;grid-template-columns:60px 1fr auto;gap:20px;align-items:start;
  padding:20px 0;border-bottom:1px solid var(--border-l);
  cursor:pointer;transition:background .18s;
  border-radius:0;
}
.art-row:hover{background:var(--navy-pale);padding-left:14px;padding-right:14px;margin:0 -14px;}
.art-num{
  font-family:'Inter',sans-serif;font-size:22px;font-weight:700;
  color:var(--border);line-height:1;padding-top:4px;
}
.art-info{display:flex;flex-direction:column;gap:6px;}
.art-cat{
  display:inline-block;background:var(--navy);padding:3px 10px;
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:#fff;
  align-self:flex-start;
}
.art-title{
  font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;
  line-height:1.35;color:var(--ink);
}
.art-dek{
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:300;
  line-height:1.8;color:var(--txt2);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.art-meta{
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  color:var(--txt3);margin-top:2px;
}
.art-arrow{
  font-size:18px;color:var(--border);padding-top:6px;
  transition:color .2s,transform .2s;flex-shrink:0;
}
.art-row:hover .art-arrow{color:var(--navy);transform:translate(3px,-3px);}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:80px 0;
}
.empty-icon{font-size:48px;margin-bottom:18px;opacity:.3;}
.empty-title{
  font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;
  color:var(--ink);margin-bottom:10px;
}
.empty-sub{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:300;
  color:var(--txt3);line-height:1.8;
}

/* ── READER OVERLAY ── */
.reader-overlay{
  display:none;position:fixed;inset:0;background:var(--bg);
  z-index:600;overflow-y:auto;
}
.reader-overlay.open{display:block;}
.reader-bar{
  position:sticky;top:0;background:var(--navy);
  padding:12px 24px;display:flex;align-items:center;gap:16px;
  z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.reader-bar-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);
}
.reader-close-btn{
  margin-left:auto;background:rgba(255,255,255,.12);border:none;
  color:#fff;font-family:'Inter',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;
  cursor:pointer;transition:background .2s;
}
.reader-close-btn:hover{background:rgba(255,255,255,.22);}
.reader-content{max-width:760px;margin:48px auto;padding:0 24px 80px;}
.reader-cover{width:100%;max-height:380px;object-fit:cover;margin-bottom:32px;display:none;}
.reader-cover.show{display:block;}
.reader-pill{
  display:inline-block;background:var(--navy);padding:4px 12px;
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:#fff;margin-bottom:14px;
}
.reader-hed{
  font-family:'Noto Serif KR',serif;font-size:36px;font-weight:700;
  line-height:1.25;color:var(--ink);margin-bottom:14px;
}
.reader-dek{
  font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:300;
  line-height:1.9;color:var(--txt2);margin-bottom:20px;
}
.reader-meta{
  display:flex;align-items:center;gap:10px;
  font-family:'Inter',sans-serif;font-size:11px;color:var(--txt3);
  margin-bottom:36px;padding-bottom:24px;border-bottom:2px solid var(--navy);
}
.reader-meta-sep{width:1px;height:12px;background:var(--border);}
.reader-body{
  font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:1.95;color:var(--ink);
}
.reader-body h1{font-family:'Noto Serif KR',serif;font-size:32px;font-weight:700;line-height:1.3;margin:28px 0 14px;}
.reader-body h2{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;margin:24px 0 12px;}
.reader-body h3{font-size:18px;font-weight:700;margin:20px 0 10px;}
.reader-body p{margin:0 0 12px;}
.reader-body blockquote{border-left:4px solid var(--navy);padding:14px 20px;margin:20px 0;background:var(--navy-pale);font-style:italic;color:var(--txt2);font-size:14px;line-height:1.9;}
.reader-body ul,.reader-body ol{padding-left:28px;margin:8px 0 12px;}
.reader-body li{margin-bottom:6px;line-height:1.85;}
.reader-body a{color:var(--navy-l);text-decoration:underline;}
.reader-body img{max-width:100%;height:auto;display:block;margin:16px auto;}
.reader-body table{border-collapse:collapse;width:100%;margin:16px 0;}
.reader-body th,.reader-body td{border:1px solid var(--border);padding:10px 14px;font-size:13px;text-align:left;}
.reader-body th{background:var(--navy);color:#fff;font-weight:700;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .page-header{padding:0 20px;}
  .filter-bar{padding:0 20px;}
  .content{padding:24px 20px 48px;}
  .hero-bar{padding:32px 20px;}
  .hero-bar-title{font-size:26px;}
  .art-row{grid-template-columns:40px 1fr auto;gap:14px;}
  .art-num{font-size:16px;}
  .art-title{font-size:15px;}
}
@media(max-width:480px){
  .page-header{padding:0 14px;}
  .hero-bar{padding:24px 14px;}
  .filter-bar{padding:0 14px;}
  .content{padding:18px 14px 40px;}
  .art-row{grid-template-columns:1fr;gap:8px;padding:16px 0;}
  .art-row:hover{padding-left:10px;padding-right:10px;margin:0 -10px;}
  .art-num{display:none;}
  .art-arrow{position:absolute;right:0;top:20px;}
  .art-row{position:relative;}
  .reader-content{padding:0 14px 60px;}
  .reader-hed{font-size:24px;}
}
</style>
</head>
<body>

<!-- READER OVERLAY -->
<div class="reader-overlay" id="reader-overlay">
  <div class="reader-bar">
    <div class="reader-bar-label">뉴스레터 읽기</div>
    <button class="reader-close-btn" onclick="closeReader()">✕ 닫기</button>
  </div>
  <div class="reader-content">
    <img class="reader-cover" id="reader-cover-img" src="" alt="">
    <div class="reader-pill" id="reader-pill"></div>
    <div class="reader-hed" id="reader-hed"></div>
    <div class="reader-dek" id="reader-dek"></div>
    <div class="reader-meta">
      <span id="reader-author"></span>
      <span class="reader-meta-sep"></span>
      <span id="reader-date"></span>
    </div>
    <div class="reader-body" id="reader-body"></div>
  </div>
</div>

<!-- HEADER -->
<header class="page-header">
  <div class="page-header-inner">
    <a class="header-brand" href="newsletter_main.html">
      <span class="header-logo">법무법인 노바</span>
      <span class="header-sep"></span>
      <span class="header-page-title">전체 뉴스레터</span>
    </a>
    <a class="header-back" href="newsletter_main.html">← 홈으로</a>
  </div>
</header>

<!-- HERO BAR -->
<div class="hero-bar">
  <div class="hero-bar-inner">
    <div class="hero-bar-eyebrow">Nova Law Firm — Newsletter</div>
    <div class="hero-bar-title">전체 뉴스레터</div>
    <div class="hero-bar-sub" id="total-count-line">발행된 뉴스레터를 모두 확인하세요.</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-bar-inner" id="filter-bar"></div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="search-row">
    <div class="search-box">
      <input class="search-input" id="search-input" type="text" placeholder="뉴스레터 제목, 내용 검색..." oninput="applyFilter()">
      <button class="search-btn" onclick="applyFilter()">검색</button>
    </div>
    <div class="result-info" id="result-info"></div>
  </div>
  <div class="sort-row">
    <span class="sort-label">정렬</span>
    <button class="sort-btn active" id="sort-new" onclick="setSort('new')">최신순</button>
    <button class="sort-btn" id="sort-old" onclick="setSort('old')">오래된 순</button>
    <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha')">가나다순</button>
  </div>
  <div class="art-list" id="art-list"></div>
</div>

<script>
/* ── DATA ── */
function getArticles(){
  try{return JSON.parse(localStorage.getItem('nova_articles')||'[]');}catch(e){return[];}
}
function getPublished(){
  return getArticles().filter(a=>a.published);
}
function formatKoreanDate(dateStr){
  if(!dateStr)return '';
  const d=new Date(dateStr.includes('T')?dateStr:dateStr+'T00:00:00');
  if(isNaN(d))return dateStr;
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

/* ── STATE ── */
let _currentCat='__all__';
let _currentSort='new';
let _searchQuery='';

/* ── FILTER BAR ── */
function buildFilterBar(){
  const arts=getPublished();
  const cats=[...new Set(arts.map(a=>a.section||'기타').filter(Boolean))];
  const bar=document.getElementById('filter-bar');
  const allCount=arts.length;

  bar.innerHTML=
    `<div class="filter-item active" data-cat="__all__" onclick="setCat('__all__',this)">
       전체 <span class="filter-count">${allCount}</span>
     </div>`+
    cats.map(c=>{
      const cnt=arts.filter(a=>(a.section||'기타')===c).length;
      return `<div class="filter-item" data-cat="${c}" onclick="setCat('${c}',this)">
        ${c} <span class="filter-count">${cnt}</span>
      </div>`;
    }).join('');

  document.getElementById('total-count-line').textContent=`총 ${allCount}개의 뉴스레터가 발행되었습니다.`;
}

function setCat(cat,el){
  _currentCat=cat;
  document.querySelectorAll('.filter-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  applyFilter();
}

/* ── SORT ── */
function setSort(s){
  _currentSort=s;
  ['new','old','alpha'].forEach(k=>document.getElementById('sort-'+k).classList.remove('active'));
  document.getElementById('sort-'+s).classList.add('active');
  applyFilter();
}

/* ── FILTER & RENDER ── */
function applyFilter(){
  _searchQuery=document.getElementById('search-input').value.trim().toLowerCase();
  let arts=getPublished();

  if(_currentCat!=='__all__'){
    arts=arts.filter(a=>(a.section||'기타')===_currentCat);
  }
  if(_searchQuery){
    arts=arts.filter(a=>
      (a.title||'').toLowerCase().includes(_searchQuery)||
      (a.dek||'').toLowerCase().includes(_searchQuery)||
      (a.body||'').toLowerCase().includes(_searchQuery)
    );
  }
  if(_currentSort==='new'){
    arts.sort((a,b)=>new Date(b.date||b.updatedAt||0)-new Date(a.date||a.updatedAt||0));
  } else if(_currentSort==='old'){
    arts.sort((a,b)=>new Date(a.date||a.updatedAt||0)-new Date(b.date||b.updatedAt||0));
  } else if(_currentSort==='alpha'){
    arts.sort((a,b)=>(a.title||'').localeCompare(b.title||'','ko'));
  }

  renderList(arts);
}

function renderList(arts){
  const list=document.getElementById('art-list');
  document.getElementById('result-info').textContent=`${arts.length}개 뉴스레터`;

  if(!arts.length){
    list.innerHTML=`
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-title">${_searchQuery?'검색 결과가 없습니다':'발행된 뉴스레터가 없습니다'}</div>
        <div class="empty-sub">${_searchQuery?`"${_searchQuery}"에 해당하는 뉴스레터를 찾을 수 없습니다.`:'아직 발행된 뉴스레터가 없습니다. 관리자가 뉴스레터를 작성하면 여기에 표시됩니다.'}</div>
      </div>`;
    return;
  }

  list.innerHTML=arts.map((a,i)=>`
    <div class="art-row" onclick="openReader('${a.id}')">
      <div class="art-num">${String(i+1).padStart(2,'0')}</div>
      <div class="art-info">
        <div class="art-cat">${a.section||'뉴스레터'}</div>
        <div class="art-title">${a.title||'(제목 없음)'}</div>
        ${a.dek?`<div class="art-dek">${a.dek}</div>`:''}
        <div class="art-meta">${a.author||''} ${a.author&&a.date?'·':''} ${formatKoreanDate(a.date)||''}</div>
      </div>
      <div class="art-arrow">↗</div>
    </div>`).join('');
}

/* ── READER ── */
function openReader(id){
  const arts=getArticles();
  const a=arts.find(x=>x.id===id);
  if(!a)return;
  const cover=document.getElementById('reader-cover-img');
  if(a.coverImage){cover.src=a.coverImage;cover.classList.add('show');}
  else{cover.src='';cover.classList.remove('show');}
  document.getElementById('reader-pill').textContent=a.section||'뉴스레터';
  document.getElementById('reader-hed').textContent=a.title||'';
  document.getElementById('reader-dek').textContent=a.dek||'';
  document.getElementById('reader-author').textContent=a.author||'';
  document.getElementById('reader-date').textContent=formatKoreanDate(a.date)||'';
  document.getElementById('reader-body').innerHTML=a.body||'';
  document.getElementById('reader-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeReader(){
  document.getElementById('reader-overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReader();});

/* ── INIT ── */
buildFilterBar();
// 메인 페이지에서 검색어 전달받기
(function(){
  const q=new URLSearchParams(window.location.search).get('q')||'';
  if(q){
    document.getElementById('search-input').value=q;
    _searchQuery=q.toLowerCase();
  }
})();
applyFilter();
</script>
</body>
</html>
