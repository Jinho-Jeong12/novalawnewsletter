<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스레터 제목 — 기사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#EEF2F7;
  --surface:#FFFFFF;
  --surface-2:#F6F9FC;
  --navy:#0A1628;
  --navy-l:#1B3870;
  --navy-pale:#ECF0F9;
  --navy-deep:#060D18;
  --red:#C83820;
  --red-d:#A82E1A;
  --ink:#0D1829;
  --txt:#1E2A3B;
  --txt2:#4B5A6B;
  --txt3:#8FA0B4;
  --border:#D6E0EC;
  --border-l:#EEF2F7;
}
body{background:var(--bg);font-family:'Noto Sans KR','Inter',sans-serif;color:var(--txt);}

/* ── HEADER ── */
.site-header{
  background:var(--surface);border-bottom:3px solid var(--navy);
  box-shadow:0 2px 10px rgba(15,35,71,.08);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:56px;position:sticky;top:0;z-index:100;
}
.site-logo{
  font-family:'Inter',sans-serif;font-size:18px;font-weight:800;
  color:var(--navy);cursor:pointer;letter-spacing:-.02em;text-decoration:none;
}
.header-nav{display:flex;gap:24px;align-items:center;}
.header-nav a{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);
  text-decoration:none;transition:color .2s;
}
.header-nav a:hover{color:var(--navy);}
.back-btn{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--navy);
  cursor:pointer;border:1px solid var(--navy);padding:8px 16px;
  transition:all .22s;text-decoration:none;
}
.back-btn:hover{background:var(--navy);color:#fff;}

/* ── PROGRESS ── */
.progress{position:fixed;top:56px;left:0;height:3px;background:var(--navy);z-index:99;width:0%;transition:width .1s;}

/* ── ARTICLE HERO ── */
.art-hero{
  background:var(--surface);
  padding:52px 0 0;
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 8px rgba(15,35,71,.05);
}
.art-hero-inner{max-width:800px;margin:0 auto;padding:0 48px;}
.art-label{display:inline-flex;align-items:center;gap:12px;margin-bottom:26px;}
.art-pill{
  background:var(--navy);padding:5px 14px;
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:#fff;
}
.art-section{
  font-family:'Inter',sans-serif;font-size:9px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);
}
.art-hed{
  font-family:'Noto Serif KR',serif;font-size:48px;font-weight:700;line-height:1.2;
  letter-spacing:-.01em;color:var(--ink);margin-bottom:22px;
}
.art-dek{
  font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:300;
  line-height:1.9;color:var(--txt2);max-width:560px;margin-bottom:32px;
}
.art-meta{
  display:flex;align-items:center;gap:0;
  padding:16px 0;border-top:1px solid var(--border);
}
.art-meta-author{
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.08em;color:var(--txt);
}
.art-meta-dot{margin:0 12px;color:var(--border);font-size:12px;}
.art-meta-time{font-family:'Inter',sans-serif;font-size:11px;color:var(--txt3);}
.art-meta-read{
  margin-left:auto;
  font-family:'Inter',sans-serif;font-size:9px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);
}

/* ── ARTICLE BODY ── */
.art-body{
  max-width:720px;margin:0 auto;padding:52px 48px 80px;
  background:var(--surface);
}
.art-body p{
  font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:300;
  line-height:2.1;color:var(--txt);margin-bottom:26px;
}
.art-body h2{
  font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;
  color:var(--navy);
  margin:48px 0 18px;padding-bottom:12px;
  border-bottom:2px solid var(--navy-pale);
}
.art-body blockquote{
  border-left:3px solid var(--navy);padding:20px 28px;
  background:var(--navy-pale);margin:36px 0;
}
.art-body blockquote p{
  font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;
  line-height:1.75;color:var(--navy);margin:0;
}
.art-body blockquote cite{
  display:block;margin-top:12px;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  color:var(--navy-l);font-style:normal;letter-spacing:.1em;text-transform:uppercase;
}

/* ── SHARE ── */
.art-share{
  max-width:720px;margin:0 auto;padding:26px 48px 38px;
  display:flex;align-items:center;gap:12px;
  border-top:1px solid var(--border);
  background:var(--surface);
}
.share-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);
}
.share-btn{
  border:1px solid var(--border);padding:8px 16px;
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);
  cursor:pointer;transition:all .22s;background:none;
}
.share-btn:hover{border-color:var(--navy);color:var(--navy);}

/* ── RELATED ── */
.related{
  background:var(--surface-2);padding:44px;
  border-top:3px solid var(--navy);
}
.related-title{
  font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;
  color:var(--navy);margin-bottom:20px;
}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.related-card{
  background:var(--surface);padding:22px 18px;cursor:pointer;
  position:relative;
  border-top:3px solid transparent;
  transition:box-shadow .22s,border-top-color .22s,transform .2s;
  box-shadow:0 1px 3px rgba(15,35,71,.07);
}
.related-card:hover{
  box-shadow:0 4px 16px rgba(15,35,71,.12);
  border-top-color:var(--navy);
  transform:translateY(-2px);
}
.rel-cat{
  font-family:'Inter',sans-serif;font-size:8px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;
}
.rel-title{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;
  line-height:1.4;color:var(--ink);margin-bottom:10px;
}
.rel-arrow{font-size:14px;color:var(--border);transition:color .22s;}
.related-card:hover .rel-arrow{color:var(--navy);}

/* ── ARTICLE FOOTER ── */
.art-foot{
  background:var(--navy);padding:22px 48px;
  display:flex;align-items:center;justify-content:space-between;
}
.art-foot-logo{
  font-family:'Inter',sans-serif;font-size:18px;font-weight:800;
  color:rgba(255,255,255,.8);cursor:pointer;letter-spacing:-.02em;
  transition:color .2s;
}
.art-foot-logo:hover{color:#fff;}
.art-foot-copy{
  font-family:'Noto Sans KR',sans-serif;font-size:10px;
  font-weight:300;color:rgba(255,255,255,.38);
}
.art-foot-sub{
  border:1px solid rgba(255,255,255,.3);padding:9px 18px;
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);
  cursor:pointer;transition:all .22s;
}
.art-foot-sub:hover{border-color:#fff;color:#fff;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:32px;right:32px;background:var(--navy);color:#fff;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  padding:12px 20px;opacity:0;transform:translateY(10px);
  transition:opacity .3s,transform .3s;z-index:200;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="toast" id="toast">링크가 복사됐습니다</div>

<header class="site-header">
  <a class="site-logo" href="newsletter_main.html">뉴스레터 제목</a>
  <nav class="header-nav">
    <a href="newsletter_main.html">트렌드</a>
    <a href="newsletter_main.html">테크</a>
    <a href="newsletter_main.html">컬처</a>
    <a href="newsletter_main.html">비즈니스</a>
  </nav>
  <a class="back-btn" href="newsletter_main.html">← 뉴스레터로</a>
</header>

<main id="article-root"></main>

<script>
window.addEventListener('scroll',function(){
  var pct=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;
  document.getElementById('progress').style.width=pct+'%';
});

var P1='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카 타파하가. 나다라마 바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마 바사아자 차카타파 하가나다.';
var P2='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카. 타파하가 나다라마 바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마.';
var P3='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마 바사아자 차카타파.';
var P4='바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마 바사아자 차카타파 하가나다 라마바사. 가나다라 마바사아 자차카타 파하나다 라마바사 아자차카 타파하가 나다라마.';
var P5='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카 타파하가 나다라마. 가나다라 마바사아 자차카타 파하나다 라마바사 아자차카.';
var DEK='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카.';
var BODY='<p>'+P1+'</p><h2>소제목 가나다라</h2><p>'+P2+'</p><p>'+P3+'</p><blockquote><p>"가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마."</p><cite>— 가나다 라마바 · 사아자차</cite></blockquote><p>'+P4+'</p><h2>소제목 마바사아</h2><p>'+P5+'</p><p>'+P1+'</p><p>'+P3+'</p>';

var articles={
  cover:  {pill:'COVER STORY',section:'경제',  hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'7 MIN READ',body:BODY,related:[{cat:'테크',    title:'기사 제목',id:'tech'},  {cat:'비즈니스',title:'기사 제목',id:'biz'},   {cat:'글로벌',  title:'기사 제목',id:'global'}]},
  trend:  {pill:'트렌드',     section:'TREND', hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'5 MIN READ',body:BODY,related:[{cat:'컬처',    title:'기사 제목',id:'culture'},{cat:'비즈니스',title:'기사 제목',id:'biz'},   {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  tech:   {pill:'테크',       section:'TECH',  hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'6 MIN READ',body:BODY,related:[{cat:'경제',    title:'기사 제목',id:'cover'}, {cat:'글로벌',  title:'기사 제목',id:'global'},{cat:'비즈니스',title:'기사 제목',id:'biz'}]},
  biz:    {pill:'비즈니스',   section:'BIZ',   hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'5 MIN READ',body:BODY,related:[{cat:'테크',    title:'기사 제목',id:'tech'},  {cat:'트렌드',  title:'기사 제목',id:'trend'}, {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  global: {pill:'글로벌',     section:'GLOBAL',hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'8 MIN READ',body:BODY,related:[{cat:'경제',    title:'기사 제목',id:'cover'}, {cat:'테크',    title:'기사 제목',id:'tech'},  {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  culture:{pill:'컬처',       section:'CULTURE',hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'4 MIN READ',body:BODY,related:[{cat:'트렌드',  title:'기사 제목',id:'trend'}, {cat:'비즈니스',title:'기사 제목',id:'biz'},   {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  opinion:{pill:'오피니언',   section:'OPINION',hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'4 MIN READ',body:BODY,related:[{cat:'경제',    title:'기사 제목',id:'cover'}, {cat:'글로벌',  title:'기사 제목',id:'global'},{cat:'비즈니스',title:'기사 제목',id:'biz'}]}
};

function getArticleId(){
  var fn=location.pathname.split('/').pop().replace('.html','');
  var map={article_cover:'cover',article_trend:'trend',article_tech:'tech',article_biz:'biz',article_global:'global',article_culture:'culture',article_opinion:'opinion'};
  return map[fn]||'cover';
}

function renderArticle(id){
  var a=articles[id];
  if(!a)return;
  document.title='뉴스레터 제목 — 기사 제목';
  window.scrollTo(0,0);
  document.getElementById('article-root').innerHTML=
    '<div class="art-hero">'
    +'<div class="art-hero-inner">'
    +'<div class="art-label"><span class="art-pill">'+a.pill+'</span><span class="art-section">'+a.section+'</span></div>'
    +'<div class="art-hed">'+a.hed+'</div>'
    +'<div class="art-dek">'+a.dek+'</div>'
    +'<div class="art-meta">'
    +'<span class="art-meta-author">'+a.author+'</span>'
    +'<span class="art-meta-dot">·</span>'
    +'<span class="art-meta-time">'+a.date+'</span>'
    +'<span class="art-meta-read">'+a.readTime+'</span>'
    +'</div>'
    +'</div>'
    +'</div>'
    +'<div class="art-body">'+a.body+'</div>'
    +'<div class="art-share">'
    +'<span class="share-label">공유</span>'
    +'<button class="share-btn" onclick="copyLink()">링크 복사</button>'
    +'<button class="share-btn" onclick="window.open(\'https://twitter.com/intent/tweet?url=\'+encodeURIComponent(location.href),\'_blank\')">X (Twitter)</button>'
    +'</div>'
    +'<div class="related">'
    +'<div class="related-title">관련 기사</div>'
    +'<div class="related-grid">'
    +a.related.map(function(r){
      return '<div class="related-card" onclick="renderArticle(\''+r.id+'\')"><div class="rel-cat">'+r.cat+'</div><div class="rel-title">'+r.title+'</div><div class="rel-arrow">↗</div></div>';
    }).join('')
    +'</div></div>'
    +'<footer class="art-foot">'
    +'<div class="art-foot-logo" onclick="location.href=\'newsletter_main.html\'">뉴스레터 제목</div>'
    +'<div class="art-foot-copy">© 2026 뉴스레터 제목</div>'
    +'<div class="art-foot-sub" onclick="location.href=\'newsletter_main.html\'">뉴스레터 구독 →</div>'
    +'</footer>';
}

function copyLink(){
  navigator.clipboard.writeText(location.href).then(function(){
    var t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2500);
  });
}

renderArticle(getArticleId());
</script>
</body>
</html>
