<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스레터 제목 — 기사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F2F2F0;font-family:'DM Sans',sans-serif;color:#111;}
.site-header{background:#111;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;position:sticky;top:0;z-index:100;}
.site-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#F5F5F5;cursor:pointer;letter-spacing:-.01em;text-decoration:none;}
.header-nav{display:flex;gap:28px;align-items:center;}
.header-nav a{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#555;text-decoration:none;transition:color .2s;}
.header-nav a:hover{color:#F5F5F5;}
.back-btn{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#666;cursor:pointer;border:1px solid #333;padding:6px 14px;transition:all .2s;text-decoration:none;}
.back-btn:hover{border-color:#777;color:#AAA;}
.progress{position:fixed;top:56px;left:0;height:2px;background:#F5F5F5;z-index:99;width:0%;transition:width .1s;}
.art-hero{background:#111;padding:64px 0 0;border-bottom:2px solid #222;}
.art-hero-inner{max-width:840px;margin:0 auto;padding:0 40px;}
.art-label{display:inline-flex;align-items:center;gap:12px;margin-bottom:24px;}
.art-pill{background:#F5F5F5;padding:4px 12px;font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#111;}
.art-section{font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#555;}
.art-hed{font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:.92;letter-spacing:.01em;color:#F5F5F5;margin-bottom:24px;}
.art-dek{font-family:'Noto Serif KR',serif;font-size:16px;line-height:1.8;color:#888;max-width:560px;margin-bottom:36px;}
.art-meta{display:flex;align-items:center;gap:24px;padding:20px 0;border-top:1px solid #2A2A2A;}
.art-meta-author{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#666;}
.art-meta-time{font-size:11px;color:#444;letter-spacing:.05em;}
.art-meta-read{margin-left:auto;font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#444;}
.art-img{background:#1A1A1A;height:320px;display:flex;align-items:center;justify-content:center;border-top:1px solid #222;margin-top:32px;position:relative;overflow:hidden;}
.art-img-num{position:absolute;right:40px;bottom:20px;font-family:'Bebas Neue',sans-serif;font-size:200px;line-height:1;color:#161616;}
.art-img-label{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#333;position:relative;z-index:1;}
.art-body{max-width:720px;margin:0 auto;padding:56px 40px 80px;}
.art-body p{font-family:'Noto Serif KR',serif;font-size:17px;line-height:1.9;color:#2A2A2A;margin-bottom:28px;}
.art-body h2{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#111;margin:48px 0 20px;padding-bottom:12px;border-bottom:1.5px solid #111;}
.art-body blockquote{border-left:3px solid #111;padding:20px 28px;background:#E8E8E8;margin:32px 0;}
.art-body blockquote p{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;line-height:1.6;color:#111;margin:0;}
.art-body blockquote cite{display:block;margin-top:12px;font-family:'DM Sans',sans-serif;font-size:11px;color:#888;font-style:normal;letter-spacing:.1em;text-transform:uppercase;}
.art-share{max-width:720px;margin:0 auto;padding:32px 40px 40px;display:flex;align-items:center;gap:16px;border-top:1.5px solid #111;}
.share-label{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#999;}
.share-btn{border:1px solid #CCC;padding:8px 16px;font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#666;cursor:pointer;transition:all .2s;background:none;}
.share-btn:hover{border-color:#111;color:#111;}
.related{background:#111;padding:48px 40px;}
.related-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#F5F5F5;margin-bottom:24px;letter-spacing:.04em;}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;background:#2A2A2A;}
.related-card{background:#1A1A1A;padding:24px 20px;cursor:pointer;transition:background .2s;}
.related-card:hover{background:#222;}
.rel-cat{font-family:'Unbounded',sans-serif;font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#555;margin-bottom:8px;}
.rel-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;line-height:1.3;color:#CCC;margin-bottom:8px;text-transform:uppercase;}
.rel-arrow{font-size:14px;color:#444;}
.art-foot{background:#0A0A0A;padding:28px 40px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #1A1A1A;}
.art-foot-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#333;cursor:pointer;letter-spacing:-.01em;}
.art-foot-copy{font-size:10px;color:#333;letter-spacing:.1em;}
.art-foot-sub{border:1px solid #2A2A2A;padding:8px 16px;font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#444;cursor:pointer;transition:all .2s;}
.art-foot-sub:hover{border-color:#555;color:#888;}
.toast{position:fixed;bottom:32px;right:32px;background:#111;color:#F5F5F5;font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:14px 20px;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;z-index:200;pointer-events:none;border:1px solid #333;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="toast" id="toast">링크가 복사됐습니다</div>

<header class="site-header">
  <a class="site-logo" href="newsletter_main.html">뉴스레터 제목</a>
  <nav class="header-nav">
    <a href="newsletter_main.html">트렌드</a>
    <a href="newsletter_main.html">테크</a>
    <a href="newsletter_main.html">컬처</a>
    <a href="newsletter_main.html">비즈니스</a>
  </nav>
  <a class="back-btn" href="newsletter_main.html">← 뉴스레터로</a>
</header>

<main id="article-root"></main>

<script>
window.addEventListener('scroll',function(){
  var pct=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;
  document.getElementById('progress').style.width=pct+'%';
});

var P1='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카 타파하가. 나다라마 바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마 바사아자 차카타파 하가나다.';
var P2='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카. 타파하가 나다라마 바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마.';
var P3='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마 바사아자 차카타파.';
var P4='바사아자 차카타파 하가나다 라마바사. 아자차카 타파하가 나다라마 바사아자 차카타파 하가나다 라마바사. 가나다라 마바사아 자차카타 파하나다 라마바사 아자차카 타파하가 나다라마.';
var P5='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카 타파하가 나다라마. 가나다라 마바사아 자차카타 파하나다 라마바사 아자차카.';
var DEK='가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마. 바사아자 차카타파 하가나다 라마바사 아자차카.';
var BODY='<p>'+P1+'</p><h2>소제목 가나다라</h2><p>'+P2+'</p><p>'+P3+'</p><blockquote><p>"가나다라 마바사아 자차카타 파하나다. 라마바사 아자차카 타파하가 나다라마."</p><cite>— 가나다 라마바 · 사아자차</cite></blockquote><p>'+P4+'</p><h2>소제목 마바사아</h2><p>'+P5+'</p><p>'+P1+'</p><p>'+P3+'</p>';

var articles={
  cover:  {pill:'COVER STORY',section:'경제',  hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'7 MIN READ',imgNum:'01',body:BODY,related:[{cat:'테크',    title:'기사 제목',id:'tech'},  {cat:'비즈니스',title:'기사 제목',id:'biz'},   {cat:'글로벌',  title:'기사 제목',id:'global'}]},
  trend:  {pill:'트렌드',     section:'TREND', hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'5 MIN READ',imgNum:'02',body:BODY,related:[{cat:'컬처',    title:'기사 제목',id:'culture'},{cat:'비즈니스',title:'기사 제목',id:'biz'},   {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  tech:   {pill:'테크',       section:'TECH',  hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'6 MIN READ',imgNum:'03',body:BODY,related:[{cat:'경제',    title:'기사 제목',id:'cover'}, {cat:'글로벌',  title:'기사 제목',id:'global'},{cat:'비즈니스',title:'기사 제목',id:'biz'}]},
  biz:    {pill:'비즈니스',   section:'BIZ',   hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'5 MIN READ',imgNum:'04',body:BODY,related:[{cat:'테크',    title:'기사 제목',id:'tech'},  {cat:'트렌드',  title:'기사 제목',id:'trend'}, {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  global: {pill:'글로벌',     section:'GLOBAL',hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'8 MIN READ',imgNum:'05',body:BODY,related:[{cat:'경제',    title:'기사 제목',id:'cover'}, {cat:'테크',    title:'기사 제목',id:'tech'},  {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  culture:{pill:'컬처',       section:'CULTURE',hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'4 MIN READ',imgNum:'06',body:BODY,related:[{cat:'트렌드',  title:'기사 제목',id:'trend'}, {cat:'비즈니스',title:'기사 제목',id:'biz'},   {cat:'오피니언',title:'기사 제목',id:'opinion'}]},
  opinion:{pill:'오피니언',   section:'OPINION',hed:'기사 제목<br>자리입니다',dek:DEK,author:'기자 이름',date:'2026.04.07',readTime:'4 MIN READ',imgNum:'07',body:BODY,related:[{cat:'경제',    title:'기사 제목',id:'cover'}, {cat:'글로벌',  title:'기사 제목',id:'global'},{cat:'비즈니스',title:'기사 제목',id:'biz'}]}
};

function getArticleId(){
  var fn=location.pathname.split('/').pop().replace('.html','');
  var map={article_cover:'cover',article_trend:'trend',article_tech:'tech',article_biz:'biz',article_global:'global',article_culture:'culture',article_opinion:'opinion'};
  return map[fn]||'cover';
}

function renderArticle(id){
  var a=articles[id];
  if(!a)return;
  document.title='뉴스레터 제목 — 기사 제목';
  window.scrollTo(0,0);
  document.getElementById('article-root').innerHTML=
    '<div class="art-hero">'
    +'<div class="art-hero-inner">'
    +'<div class="art-label"><span class="art-pill">'+a.pill+'</span><span class="art-section">'+a.section+'</span></div>'
    +'<div class="art-hed">'+a.hed+'</div>'
    +'<div class="art-dek">'+a.dek+'</div>'
    +'<div class="art-meta"><span class="art-meta-author">'+a.author+'</span><span class="art-meta-time">'+a.date+'</span><span class="art-meta-read">'+a.readTime+'</span></div>'
    +'</div>'
    +'<div class="art-img"><span class="art-img-label">기사 이미지 / 그래픽</span><span class="art-img-num">'+a.imgNum+'</span></div>'
    +'</div>'
    +'<div class="art-body">'+a.body+'</div>'
    +'<div class="art-share">'
    +'<span class="share-label">공유</span>'
    +'<button class="share-btn" onclick="copyLink()">링크 복사</button>'
    +'<button class="share-btn" onclick="window.open(\'https://twitter.com/intent/tweet?url=\'+encodeURIComponent(location.href),\'_blank\')">X (Twitter)</button>'
    +'</div>'
    +'<div class="related">'
    +'<div class="related-title">관련 기사</div>'
    +'<div class="related-grid">'
    +a.related.map(function(r){return '<div class="related-card" onclick="renderArticle(\''+r.id+'\')"><div class="rel-cat">'+r.cat+'</div><div class="rel-title">'+r.title+'</div><div class="rel-arrow">↗</div></div>';}).join('')
    +'</div></div>'
    +'<footer class="art-foot">'
    +'<div class="art-foot-logo" onclick="location.href=\'newsletter_main.html\'">뉴스레터 제목</div>'
    +'<div class="art-foot-copy">© 2026 서울경제신문</div>'
    +'<div class="art-foot-sub" onclick="location.href=\'newsletter_main.html\'">뉴스레터 구독 →</div>'
    +'</footer>';
}

function copyLink(){
  navigator.clipboard.writeText(location.href).then(function(){
    var t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2500);
  });
}

renderArticle(getArticleId());
</script>
</body>
</html>
